                    <h2 class="text1">
                        Den skrikande wankellegenden
                    </h2>
                    <figcaption>
                        Den första japanska bilen att vinna Le Mans
                    </figcaption class="text1">
                    <p class="text1">
                        Mazda 787B är en legendarisk racerbil som vann Le Mans 1991. Den drivs av en unik fyrrotors Wankelmotor med högt varvtal och ikoniskt ljud. Bilen representerar innovation, uthållighet och japansk ingenjörskonst, och är fortfarande älskad av motorsportfans världen över för sin historia och prestanda. Den är en symbol för racinghistoria.
                    </p>
                </figure>
            </article>
            <article>
                <figure class="fig2">
                    <img src="https://driver61.com/wp-content/uploads/2024/11/R26B-2.jpg" alt="" class="bild2">
                    <h3 class="text2">
                        Motorn: 2.6l 4 Rotor wankel
                    </h3>
                    <figcaption class="text2">
                        En sällsynt och udda motor
                    </figcaption>
                    <p class="text2">
                        Mazda R26B är en fyrrotor Wankelmotor som satt i tävlingsbilen 787B. Den levererade hög effekt, runt 700 hästkrafter, och använde avancerad insugning och variabla längder. Motorn är känd för sitt höga varvtal, unika ljud och historiska seger i Le Mans 1991 som första japanska vinnare någonsin med ett ikoniskt arv
                    </p>
                </figure>
