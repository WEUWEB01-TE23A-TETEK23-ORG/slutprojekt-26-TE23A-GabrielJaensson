        <main>
            <article>
                <figure>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/17/Jaguar_XJR-9_LM_front-left_Heritage_Motor_Centre%2C_Gaydon.jpg" alt="">
                    <h2>
                        Den rytande Jaguaren
                    </h2>
                    <figcaption>
                        Bilen som bröt Porsches segerserie
                    </figcaption>
                    <p>
                       Jaguar XJR-9 drevs av en stor 7,0-liters sugmotor-V12 som utvecklades av Jaguar för långloppsracing i Group C. Motorn producerade omkring 750 hästkrafter och var känd för sitt höga varvtal, mjuka kraftleverans och sitt ikoniska skrikande V12-ljud. Till skillnad från många konkurrenter med turbomotorer satsade Jaguar på en stark sugmotor med snabb respons och hög tillförlitlighet under långa lopp. Kombinationen av kraft, aerodynamik och hållbarhet gjorde XJR-9 mycket framgångsrik, och bilen vann bland annat Le Mans 1988 efter en hård kamp mot Porsche och Sauber-Mercedes.
                    </p>
                    <h2>Fortsättningen: XJR-14</h2>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/XJR14at2023Retromobile.jpg/3840px-XJR14at2023Retromobile.jpg" alt="">
                    <p>Jaguar XJR-14 drevs av en 3,5-liters Cosworth HB-V8, samma motorfamilj som användes i Formel 1 under början av 1990-talet. Motorn utvecklade omkring 650 hästkrafter vid mycket höga varvtal och gav bilen snabb acceleration samt låg vikt jämfört med äldre Group C-bilar. Tillsammans med Ross Brawns avancerade aerodynamik gjorde den XJR-14 extremt snabb i kurvor och till en av de mest tekniskt avancerade sportvagnarna i sin tid.</p>
                </figure>
            </article>
            <article>
                <figure>
                    <h3>
                        Giganten: 7 Liters V12
                    </h3>
                    <img src="https://rmsothebys.com/media/391437/mc22_xjr_9_3new.jpg?width=1200px%3Bheight%3Dauto" alt="">
                    <button onclick="jaguar()">Hör motorn här!</button>
                    <figcaption>
                    Lyx ombyggd för vinnst
                    </figcaption>
                    <p>
                        Jaguar XJR-9 hade en 7,0-liters sug-V12 som gav runt 750 hästkrafter och ett av de mest ikoniska motorljuden i racinghistorien. Motorn kombinerade hög effekt med snabb respons och hjälpte Jaguar att vinna Le Mans 1988.
                    </p>
                    <h3>Sökandet för varvtal: 12000 RPM</h3>
                    <img src="https://www.lpengines.co.uk/v/ui/8574492/p287461783_dww12.0.jpg?1702906965" alt="">
                    <p>Cosworth HB-V8:an i Jaguar XJR-14 kunde varva till ungefär 11 500–12 000 rpm beroende på specifikation och trimning. Det var mycket högt för en sportvagnsmotor på den tiden och bidrog till motorns snabba respons och karaktäristiska Formel 1-liknande ljud.</p>
                </figure>
            </article>
