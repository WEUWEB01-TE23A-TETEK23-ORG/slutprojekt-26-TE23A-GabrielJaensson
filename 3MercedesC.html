                    <h2>
                        Den skrikande wankellegenden
                    </h2>
                    <figcaption>
                        Mercedes återvändande till Le Mans
                    </figcaption>
                    <p>
                        Sauber Mercedes C9 var en legendarisk tävlingsbil från slutet av 1980-talet, utvecklad av Sauber i samarbete med Mercedes-Benz. Den hade en kraftfull dubbelturbomatad V8-motor och dominerade sportvagns-VM 1989, där den även vann 24 Hours of Le Mans. Med topphastigheter nära 400 km/h blev C9 en ikon från Group C-eran.
                    </p>
                    <img src="https://automobilist.com/cdn/shop/articles/LM100_SauberMercedesC9_Magazine_Header_1000x563_421d0bb6-3479-41d1-8a3a-1fa742b684af.jpg?v=1685278045&width=2048" alt="">
                </figure>
            </article>

                    <h3>
                       Motorn: 2.6l 4 Rotor wankel
                    </h3>
                    <p>
                        Mazda R26B är en fyrrotor Wankelmotor som satt i tävlingsbilen 787B. Den levererade hög effekt, runt 700 hästkrafter, och använde avancerad insugning och variabla längder. Motorn är känd för sitt höga varvtal, unika ljud och historiska seger i Le Mans 1991 som första japanska vinnare någonsin med ett ikoniskt arv
                    </p>
